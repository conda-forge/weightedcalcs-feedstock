{% set name = "weightedcalcs" %}
{% set version = "0.1.3" %}
{% set compress_type = "tar.gz" %}
{% set hash = "78853f53409991671a34c2f06153d380083a4d1b242829897f15a9e5013036d5" %}
{% set build = 0 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.{{ compress_type }}
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ compress_type }}
  sha256: {{ hash }}

build:
  noarch: python
  number: {{ build }}
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - pip
    - python
    - setuptools
    - pandas >=0.19

  run:
    - python
    - pandas >=0.19

test:
  imports:
    - weightedcalcs

about:
  home: https://github.com/jsvine/weightedcalcs
  license_file: LICENSE.txt
  license: MIT
  license_family: MIT
  summary: 'Pandas-based utility to calculate weighted means, medians, distributions, standard deviations, and more.'
  dev_url: https://github.com/jsvine/weightedcalcs
  doc_url: https://github.com/jsvine/weightedcalcs

extra:
  recipe-maintainers:
    - pmlandwehr
